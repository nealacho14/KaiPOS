services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - '4001:4001'
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./packages/shared/src:/app/packages/shared/src
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/kaipos
      - PORT=4001
    depends_on:
      - mongo

  frontend-admin:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ./apps/frontend-admin/src:/app/apps/frontend-admin/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/ui/src:/app/packages/ui/src
    environment:
      - VITE_API_URL=http://backend:4001
      - VITE_PORT=3001
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=kaipos

volumes:
  mongo_data:
