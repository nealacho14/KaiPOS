<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>kaiPOS — Login &amp; Registro</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;450;500;550;600;650;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
html, body { margin:0; padding:0; background:#f0eee9; }
body { font-family: "Inter", -apple-system, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="auth-components.jsx"></script>

<script type="text/babel" data-presets="env,react">
function App() {
  return (
    <DesignCanvas>
      <DCSection
        title="kaiPOS · Autenticación"
        subtitle="Tres pantallas: PIN del staff en la terminal, login del merchant en web, y registro multi-paso. Interactúa con cada una."
      >
        <DCArtboard label="01 · Staff PIN — Terminal POS · 1280×800" width={1280} height={800}>
          <StaffPinLogin />
        </DCArtboard>

        <DCArtboard label="02 · Merchant Login — Web admin · 1280×800" width={1280} height={800}>
          <MerchantLogin />
        </DCArtboard>

        <DCArtboard label="03 · Registro — 4 pasos · 1280×880" width={1280} height={880}>
          <MerchantRegister />
        </DCArtboard>
      </DCSection>

      <DCPostIt top={90} left={40} rotate={-3} width={230}>
        Dos contextos distintos: <b>staff</b> entra con PIN en la terminal, <b>merchant</b> entra por web con email.
      </DCPostIt>
      <DCPostIt top={260} left={40} rotate={2} width={230}>
        Prueba el PIN de Alex L. — cualquier código que no sea 1234 muestra el estado de error.
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
