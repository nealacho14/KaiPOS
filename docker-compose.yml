services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    ports:
      - '4001:4001'
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./packages/shared/src:/app/packages/shared/src
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - MONGO_URI=mongodb://mongo:27017/kaipos
      - PORT=4001
      # MinIO (S3-compatible) for product image uploads. The endpoint is set to
      # localhost:9000 because this URL gets embedded in the pre-signed PUT
      # returned to the browser — the browser runs on the host and must be able
      # to reach it. The backend itself never makes network calls to S3 (only
      # presigns, which is pure signature math), so using a host-facing
      # endpoint from inside the container is safe.
      - ASSETS_BUCKET_NAME=kaipos-assets-dev
      - S3_ENDPOINT=http://localhost:9000
      - AWS_ACCESS_KEY_ID=kaipos
      - AWS_SECRET_ACCESS_KEY=kaiposdev123
      - AWS_REGION=us-east-1
    depends_on:
      mongo:
        condition: service_started
      minio-init:
        condition: service_completed_successfully

  frontend-admin:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    ports:
      - '3001:3001'
    volumes:
      - ./apps/frontend-admin/src:/app/apps/frontend-admin/src
      - ./packages/shared/src:/app/packages/shared/src
      - ./packages/ui/src:/app/packages/ui/src
    environment:
      - VITE_API_URL=http://backend:4001
      - VITE_PORT=3001
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=kaipos

  # S3-compatible object store for product images in local dev. Console UI is
  # exposed on :9001 (login with MINIO_ROOT_USER / MINIO_ROOT_PASSWORD below).
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=kaipos
      - MINIO_ROOT_PASSWORD=kaiposdev123
    healthcheck:
      test: ['CMD-SHELL', 'mc ready local || exit 1']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot init container: creates the assets bucket and opens anonymous GET
  # so the frontend can display images directly by URL. Runs once and exits;
  # the backend depends on this completing successfully.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        mc alias set kaipos http://minio:9000 kaipos kaiposdev123
        mc mb --ignore-existing kaipos/kaipos-assets-dev
        mc anonymous set download kaipos/kaipos-assets-dev
    restart: 'no'

volumes:
  mongo_data:
  minio_data:
